services:
  - type: web
    name: oloidbot
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_APP_TOKEN
        sync: false
      - key: SLACK_USER_TOKEN
        sync: false
      - key: BASE_URL
        sync: false
      - key: FERNET_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: POLL_INTERVAL_MINUTES
        value: "5"
    # No disk needed — data lives in Supabase
